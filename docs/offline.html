<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scenario Spark — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Roboto', 'Segoe UI', Arial, sans-serif; background: #f5f5f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .container { text-align: center; padding: 2rem; max-width: 480px; }
    .icon { font-size: 4rem; margin-bottom: 1rem; }
    h1 { color: #212121; margin-bottom: 0.5rem; }
    p { color: #757575; line-height: 1.6; }
    a { display: inline-block; margin-top: 1.5rem; padding: 0.75rem 1.5rem; background: #FF7800; color: white; text-decoration: none; border-radius: 4px; font-weight: 500; }
    a:hover { background: #e66a00; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">&#x1F4E3;</div>
    <h1>You are offline</h1>
    <p>Scenario Spark could not reach the network. Please check your internet connection and try again.</p>
    <a href="javascript:location.reload()">Retry</a>
  </div>
</body>
</html>
